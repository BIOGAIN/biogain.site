  summary: "Lone is a Professor at [Aalborg University](https://vbn.aau.dk/en/persons/lonek/), where she leads the Danish Center for Environmental Assessment. Her research focuses on sustainability, environmental assessment, and green transition processes and how sustainability can be integrated into decision-making. She is particularly concerned with creating strong links between research and practice."

