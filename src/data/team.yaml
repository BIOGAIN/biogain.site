  summary: "Alexandra is Associate Professor at [BOKU University](https://boku.ac.at/personen/person/A74489DAFAB5F2CF) in the field of spatial planning with Focus and venia in the field of environmental planning. She has extensive experience in the field of Environmental Assessment both in research and teaching as well as in practical applications. Over the past five years recent research covered climate change, biodiversty and the methodological challenges and opportunities related to advanced digitalisation and AI."

- id: anna-duden
  name: "Anna Duden"
  affiliation: "Utrecht University"
  affiliationShort: "UU"
  country: "Netherlands"
  links:
    - https://www.uu.nl/staff/ASDuden
  workPackages: []
  summary: "Anna is an Assistant Professor at [Utrecht University](https://www.uu.nl/staff/ASDuden) with over ten years of experience researching the drivers and environmental impacts of land-use change, including spatially explicit biodiversity impact assessments. Her research interests include climate change mitigation and adaptation, bioenergy, large-scale reforestation, and other nature-based solutions."

