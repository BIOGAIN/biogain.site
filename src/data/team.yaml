  workPackages: []
  summary: "Emilia is an Assistant Professor at [Aalborg University](https://vbn.aau.dk/en/persons/emiliarb/) and part of the Danish Centre for Environmental Assessment focusing on sustainability and green transition. Her research focuses on biodiversity integration, environmental assessment, and the role of the Sustainable Development Goals (SDGs) in supporting sustainable transitions and decision-making processes."

