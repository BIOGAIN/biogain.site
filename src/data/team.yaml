  workPackages: []
  summary: "Marc is an animal geneticist working as a university assistant at the Institute of Wildlife Biology and Game Management at [BOKU University](https://boku.ac.at/en/personen/person/85462D83E80BAB31). Marc is currently trying to investigate the population health and management strategies of endangered wildlife species through the use of genetics and connectivity monitoring. The research involves population dynamics, behavioural ecology, and population genetics."

