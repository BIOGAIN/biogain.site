  summary: "Gesa is a Professor and Head of the Environmental Assessments Department at [Technische Universität Berlin](https://www.tu.berlin/umweltpruefungen/ueber-uns/prof-dr-gesa-geissler). Her research and teaching examine the socio-environmental implications of energy transitions, with a particular focus on the role of environmental assessment and planning in shaping these processes."

- id: grzegorz-chrobak
  name: "Grzegorz Chrobak"
  affiliation: "Wrocław University of Environmental and Life Sciences"
  affiliationShort: "UPWr"
  country: "Poland"
  links:
    - https://bazawiedzy.upwr.edu.pl/info.seam?id=UPWrf89850f786774a2cb1bf97b2ca1699e2&lang=en
  workPackages:
    - WP5 lead
  summary: "Grzegorz is an urban scientist and academic researcher working at the intersection of environmental monitoring, ecoacoustics, network science, and spatial analysis. He leads the Soundscape and Environmental Acoustics Lab, where they study urban sound environments, acoustic biodiversity, and the relationship between sound, green infrastructure, and human experience. His work combines field measurements, geospatial data, machine learning, and graph-based methods to better understand urban ecosystems and support more resilient cities."

