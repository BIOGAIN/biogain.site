  country: "Austria"
  links:
    - https://boku.ac.at/personen/person/845477E27DCC6836/
  workPackages: []
  summary: "Fabian is a wildlife biologist working as an university assistant at the Institute of Wildlife Biology and Game Management at [BOKU University](https://boku.ac.at/personen/person/845477E27DCC6836/). He investigates the management of wildlife species and land use conflicts involving wildlife. His research involves different modelling approaches including habitat and connectivity modeling, modeling of conflict potential and Bayesian decision networks."

