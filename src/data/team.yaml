  summary: "Laura holds a Master's degree in Natural Sciences and is currently a research trainee at [BOKU University](https://boku.ac.at/en/) in Vienna. Her interests include biodiversity conservation, soundscape ecology, environmental assessment, human-nature interactions, and sustainable planning."

