    - https://scholar.google.com/citations?user=C85eS3kAAAAJ
    - https://orcid.org/0000-0002-4929-8376
  workPackages: []
  summary: "Boris is a landscape researcher at [BOKU University](https://forschung.boku.ac.at/en/researcher/Boris-Salak-327FB3A1DFC27ED3) and [TU Vienna](https://landscape-tuwien.at/en/team/team-member/boris-salak) with expertise in socio-techno-ecological transformation research, spatial energy planning, and the integration of social preferences into renewable energy siting optimization. Within BIOGAIN, he contributes to the design and analysis of stakeholder-oriented planning and decision-support approaches that connect biodiversity-positive planning with climate-neutral energy transitions."

- id: brady-mattsson
  name: "Brady Mattsson"
  affiliation: "BOKU University"
  affiliationShort: "BOKU"
  country: "Austria"
  links:
    - https://boku.ac.at/en/personen/person/E0CBBD47B7286435/
    - https://www.researchgate.net/profile/Brady-Mattsson
    - https://scholar.google.com/citations?user=jbejajsAAAAJ
  workPackages:
    - WP4 lead
  summary: "Brady applies population models along with developing and testing decision support systems through collaborative decision analysis and Bayesian decision networks to tackle complex conservation issues involving wildlife species.  He works as an Associate Professor at [BOKU University](https://boku.ac.at/en/personen/person/E0CBBD47B7286435/) in Vienna and is applying these methods in multi-scale contexts involving migratory birds and large mammals in diverse terrestrial systems of Europe and North America."

