  workPackages: []
  summary: "Eva is a wildlife biologist working at [BOKU University](https://boku.ac.at/en/personen/person/E282851844CCBB84/), Institute of Wildlife Biology and Game Management. As a Senior Scientist, Eva studies effects of changes in land cover, land use and climate on wildlife distribution, with a particular focus on birds."

- id: fabian-knufinke
