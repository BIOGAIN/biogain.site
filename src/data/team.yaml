  summary: "Bart is a Postdoctoral Researcher at [Utrecht University's](https://www.uu.nl/medewerkers/BDHoekstra) Copernicus Institute of Sustainable Development. An earth scientist turned ecologist, he combines remote sensing, machine learning, and citizen-science data to study how environmental change and human activity shape biodiversity, with a long-running focus on migratory birds and nature-inclusive energy infrastructure."

- id: boris-salak
  name: "Boris Salak"
  affiliation: "BOKU University"
  affiliationShort: "BOKU"
  country: "Austria"
  links:
