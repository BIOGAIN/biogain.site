  summary: "Jendrik is a university assistant at [BOKU University](https://forschung.boku.ac.at/en/researcher/Jendrik-Windt-FD9AF7AA4E203920), Institute of Wildlife Biology and Game Management. He develops, tests and evaluates modeling approaches to investigate ecological questions and to inform sustainable management and conservation of wildlife. His research focuses on the population dynamics and behavioral ecology of a variety of species, including birds and mammals. "

